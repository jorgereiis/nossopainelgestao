<!-- Modal: Editar Dados do Atendente -->
<div class="modal fade" id="modal-editar-atendente-dados" tabindex="-1" aria-labelledby="modal-editar-atendente-dados-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-editar-atendente-dados-label">
                    <i class="bi bi-person-gear me-2 text-primary"></i>Editar Atendente — <strong id="edit-dados-atendente-nome"></strong>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <form id="form-editar-atendente-dados" novalidate>
                    {% csrf_token %}
                    <input type="hidden" id="edit-dados-atendente-id">

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label for="edit-dados-first-name" class="form-label fw-semibold">
                                Nome <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="edit-dados-first-name" class="form-control"
                                   placeholder="Nome" maxlength="150" autocomplete="off">
                        </div>
                        <div class="col-6">
                            <label for="edit-dados-last-name" class="form-label fw-semibold">Sobrenome</label>
                            <input type="text" id="edit-dados-last-name" class="form-control"
                                   placeholder="Sobrenome" maxlength="150" autocomplete="off">
                        </div>
                        <div class="col-12">
                            <label for="edit-dados-username" class="form-label fw-semibold">
                                Nome de usuário <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="edit-dados-username" class="form-control"
                                   placeholder="usuario123" maxlength="150" autocomplete="off">
                            <div class="form-text">Usado para login. Apenas letras, números e @/./+/-/_</div>
                        </div>
                        <div class="col-12">
                            <label for="edit-dados-email" class="form-label fw-semibold">E-mail</label>
                            <input type="email" id="edit-dados-email" class="form-control"
                                   placeholder="email@exemplo.com" maxlength="254" autocomplete="off">
                        </div>
                    </div>

                    <!-- Horário de Expediente -->
                    <div class="border-top pt-3 mb-4">
                        <h6 class="fw-bold mb-3"><i class="bi bi-clock me-2 text-primary"></i>Horário de Expediente</h6>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="edit-dados-horario-inicio" class="form-label fw-semibold">
                                    Início <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="edit-dados-horario-inicio" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label for="edit-dados-horario-fim" class="form-label fw-semibold">
                                    Fim <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="edit-dados-horario-fim" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="edit-dados-tem-intervalo"
                                           onchange="document.getElementById('edit-dados-intervalo-block').classList.toggle('d-none', !this.checked)">
                                    <label class="form-check-label" for="edit-dados-tem-intervalo">Possui intervalo / almoço</label>
                                </div>
                            </div>
                            <div id="edit-dados-intervalo-block" class="col-12 d-none">
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label for="edit-dados-intervalo-inicio" class="form-label fw-semibold">
                                            Início do intervalo <span class="text-danger">*</span>
                                        </label>
                                        <input type="time" id="edit-dados-intervalo-inicio" class="form-control">
                                    </div>
                                    <div class="col-6">
                                        <label for="edit-dados-intervalo-fim" class="form-label fw-semibold">
                                            Fim do intervalo <span class="text-danger">*</span>
                                        </label>
                                        <input type="time" id="edit-dados-intervalo-fim" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="border-top pt-3">
                        <h6 class="fw-bold mb-3"><i class="bi bi-key me-2 text-primary"></i>Alterar Senha <span class="text-muted fw-normal small">(opcional)</span></h6>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="edit-dados-nova-senha" class="form-label fw-semibold">Nova Senha</label>
                                <input type="password" id="edit-dados-nova-senha" class="form-control"
                                       placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                            </div>
                            <div class="col-6">
                                <label for="edit-dados-nova-senha2" class="form-label fw-semibold">Confirmar Nova Senha</label>
                                <input type="password" id="edit-dados-nova-senha2" class="form-control"
                                       placeholder="Repita a senha" autocomplete="new-password">
                            </div>
                        </div>
                    </div>

                    <div id="edit-dados-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-salvar-atendente-dados" class="btn btn-primary" onclick="submeterEditarAtendenteDados()">
                    <i class="bi bi-floppy me-1"></i>Salvar Alterações
                </button>
            </div>
        </div>
    </div>
</div>
