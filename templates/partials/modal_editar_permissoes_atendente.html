<!-- Modal: Editar Permissões do Atendente -->
<div class="modal fade" id="modal-editar-permissoes-atendente" tabindex="-1" aria-labelledby="modal-editar-permissoes-atendente-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-editar-permissoes-atendente-label">
                    <i class="bi bi-shield-lock me-2 text-primary"></i>
                    Editar Permissões — <strong id="perm-atendente-nome"></strong>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="perm-atendente-id">

                <p class="text-muted small mb-4">
                    Configure quais áreas este atendente poderá acessar.
                    As abas <strong>Renovações</strong> e <strong>Atendimentos</strong> são sempre acessíveis.
                </p>

                <!-- Seção: Menu Principal (Navbar) -->
                <div class="mb-4">
                    <h6 class="fw-bold text-uppercase text-muted small mb-3 border-bottom pb-2">
                        <i class="bi bi-list me-1"></i>Menu Principal (Sidebar)
                    </h6>
                    <div class="row g-2">
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_clientes" name="nav_clientes">
                                <label class="form-check-label" for="perm-nav_clientes">
                                    <i class="bi bi-people me-1 text-muted"></i>Clientes
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_cadastros" name="nav_cadastros">
                                <label class="form-check-label" for="perm-nav_cadastros">
                                    <i class="bi bi-file-earmark-plus me-1 text-muted"></i>Cadastros
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_whatsapp" name="nav_whatsapp">
                                <label class="form-check-label" for="perm-nav_whatsapp">
                                    <i class="bi bi-whatsapp me-1 text-muted"></i>WhatsApp
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_relatorios" name="nav_relatorios">
                                <label class="form-check-label" for="perm-nav_relatorios">
                                    <i class="bi bi-bar-chart-line me-1 text-muted"></i>Relatórios
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_logs" name="nav_logs">
                                <label class="form-check-label" for="perm-nav_logs">
                                    <i class="bi bi-journal-text me-1 text-muted"></i>Logs
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-nav_configuracoes" name="nav_configuracoes">
                                <label class="form-check-label" for="perm-nav_configuracoes">
                                    <i class="bi bi-gear me-1 text-muted"></i>Configurações
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção: Dashboard — Cards -->
                <div class="mb-4">
                    <h6 class="fw-bold text-uppercase text-muted small mb-3 border-bottom pb-2">
                        <i class="bi bi-grid me-1"></i>Dashboard — Cards
                    </h6>
                    <div class="row g-2">
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_clientes" name="dash_card_clientes">
                                <label class="form-check-label" for="perm-dash_card_clientes">Clientes Ativos</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_recebido" name="dash_card_recebido">
                                <label class="form-check-label" for="perm-dash_card_recebido">Valor Recebido</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_a_receber" name="dash_card_a_receber">
                                <label class="form-check-label" for="perm-dash_card_a_receber">À Receber</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_planos" name="dash_card_planos">
                                <label class="form-check-label" for="perm-dash_card_planos">Resumo de Planos</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_adesao" name="dash_card_adesao">
                                <label class="form-check-label" for="perm-dash_card_adesao">Adesões/Cancelamentos</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_estados" name="dash_card_estados">
                                <label class="form-check-label" for="perm-dash_card_estados">Clientes por Estado</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_card_servidor" name="dash_card_servidor">
                                <label class="form-check-label" for="perm-dash_card_servidor">Clientes por Servidor</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção: Dashboard — Abas -->
                <div class="mb-4">
                    <h6 class="fw-bold text-uppercase text-muted small mb-3 border-bottom pb-2">
                        <i class="bi bi-layout-tabs me-1"></i>Dashboard — Abas
                    </h6>
                    <div class="row g-2">
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" checked disabled>
                                <label class="form-check-label text-muted">
                                    <i class="bi bi-lock-fill me-1" style="font-size:0.7rem;"></i>Renovações
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" checked disabled>
                                <label class="form-check-label text-muted">
                                    <i class="bi bi-lock-fill me-1" style="font-size:0.7rem;"></i>Atendimentos
                                </label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_tab_evolucao" name="dash_tab_evolucao">
                                <label class="form-check-label" for="perm-dash_tab_evolucao">Evolução de Patrimônio</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_tab_adesao" name="dash_tab_adesao">
                                <label class="form-check-label" for="perm-dash_tab_adesao">Adesão e Cancelamentos</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-dash_tab_receita" name="dash_tab_receita">
                                <label class="form-check-label" for="perm-dash_tab_receita">Receita Anual</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção: Perfil -->
                <div class="mb-2">
                    <h6 class="fw-bold text-uppercase text-muted small mb-3 border-bottom pb-2">
                        <i class="bi bi-person-circle me-1"></i>Perfil
                    </h6>
                    <div class="row g-2">
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-perfil_estatisticas" name="perfil_estatisticas">
                                <label class="form-check-label" for="perm-perfil_estatisticas">Estatísticas</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input perm-check" type="checkbox" id="perm-perfil_exportar" name="perfil_exportar">
                                <label class="form-check-label" for="perm-perfil_exportar">Exportar Dados</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="perm-edit-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-salvar-permissoes" class="btn btn-primary" onclick="submeterPermissoes()">
                    <i class="bi bi-shield-check me-1"></i>Salvar Permissões
                </button>
            </div>
        </div>
    </div>
</div>
